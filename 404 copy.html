<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - どこにいるの？</title>
    <style>
        /*======================================
    Color
======================================*/

:root{

    --bg:#ffeeff;

    --pink:#ff6fae;

    --pink-light:#ffd7ec;

    --pink-dark:#ff4f97;

    --purple:#d3b2e8;

    --black:#241820;

    --white:#ffffff;

}


/*======================================
    Body
======================================*/

body{

    margin:0;

    overflow:hidden;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:

        radial-gradient(circle at top,#ffffff 0%,#ffeeff 45%,#ffe4f6 100%);

    position:relative;

}


/* ドット */

body::before{

    content:"";

    position:absolute;

    inset:0;

    opacity:.15;

    background:

    radial-gradient(

        var(--purple) 10%,

        transparent 11%

    );

    background-size:32px 32px;

}


/* 光 */

body::after{

    content:"";

    position:absolute;

    width:700px;

    height:700px;

    border-radius:50%;

    left:50%;

    top:40%;

    transform:translate(-50%,-50%);

    background:

        radial-gradient(

            rgba(255,255,255,.9),

            rgba(255,255,255,0)

        );

    filter:blur(80px);

    z-index:-1;

}


/*======================================
    Card
======================================*/

.error-container{

    position:relative;

    overflow:hidden;

    text-align:center;

    width:min(92%,470px);

    padding:55px 35px;

    border-radius:28px;

    background:

        rgba(255,255,255,.72);

    backdrop-filter:blur(12px);

    border:

        2px solid rgba(255,255,255,.8);

    box-shadow:

        0 25px 60px rgba(255,120,180,.18),

        inset 0 1px 0 rgba(255,255,255,.9);

}


/*======================================
    Lace
======================================*/

.error-container .lace{

    position:absolute;

    left:0;

    width:100%;

    height:18px;

}

.error-container .lace.top{

    top:0;

}

.error-container .lace.bottom{

    bottom:0;

    transform:rotate(180deg);

}

.error-container .lace::before{

    content:"";

    position:absolute;

    inset:0;

    background:

        radial-gradient(circle at 9px 9px,

        white 8px,

        transparent 8.5px);

    background-size:18px 18px;

}


/*======================================
    Ribbon
======================================*/

.error-container::before,

.error-container::after{

    content:"";

    position:absolute;

    width:48px;

    height:18px;

    background:

        linear-gradient(

            180deg,

            #ffb2d8,

            #ff6fae

        );

    border-radius:999px;

    top:18px;

    box-shadow:

        0 5px 12px rgba(255,120,180,.25);

}

.error-container::before{

    left:24px;

    transform:

        rotate(38deg);

}

.error-container::after{

    right:24px;

    transform:

        rotate(-38deg);

}


/* リボン中央 */

.error-container span.ribbon-center{

    display:none;

}


/*======================================
    Cross
======================================*/

.error-container .cross{

    position:absolute;

    width:20px;

    height:20px;

}

.error-container .cross::before,

.error-container .cross::after{

    content:"";

    position:absolute;

    left:50%;

    top:50%;

    background:white;

    transform:

        translate(-50%,-50%);

}

.error-container .cross::before{

    width:4px;

    height:20px;

}

.error-container .cross::after{

    width:20px;

    height:4px;

}


/*======================================
    Title
======================================*/

.error-code{

    margin-top:5px;

    font-size:5.7rem;

    font-weight:900;

    color:var(--black);

    text-shadow:

        4px 4px 0 var(--pink),

        -2px -2px 0 white;

    animation:

        glitch 2.5s infinite alternate;

}

@keyframes glitch{

    from{

        text-shadow:

        4px 4px 0 var(--pink);

    }

    to{

        text-shadow:

        -4px -4px 0 var(--purple);

    }

}

.error-status{

    margin-top:-5px;

    letter-spacing:4px;

    color:var(--pink-dark);

    font-weight:bold;

}

/*======================================
    PTP Sheet
======================================*/

.error-container{

    isolation:isolate;

}

.error-container::selection{

    background:var(--pink);

    color:#fff;

}

.error-container::after{

    box-shadow:
        0 5px 12px rgba(255,120,180,.25),
        0 0 18px rgba(255,170,220,.35);

}

.medicine-display{

    position:relative;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:28px;

    margin-bottom:18px;

}

.medicine-display::before{

    content:"";

    position:absolute;

    width:210px;

    height:92px;

    border-radius:22px;

    background:

        linear-gradient(

            rgba(255,255,255,.28),

            rgba(255,255,255,.12)

        );

    border:1px solid rgba(255,255,255,.55);

    backdrop-filter:blur(4px);

    z-index:-1;

}


/*======================================
    Capsule
======================================*/

.capsule{

    position:relative;

    width:76px;

    height:34px;

    border-radius:999px;

    overflow:hidden;

    background:

        linear-gradient(

            90deg,

            var(--pink) 0%,

            var(--pink) 50%,

            #fff 50%,

            #fff 100%

        );

    box-shadow:

        inset 0 3px 5px rgba(255,255,255,.95),

        inset 0 -6px 8px rgba(0,0,0,.08),

        0 8px 18px rgba(255,140,190,.25);

}

.capsule::before{

    content:"";

    position:absolute;

    left:50%;

    top:0;

    width:2px;

    height:100%;

    transform:translateX(-50%);

    background:

        rgba(255,255,255,.85);

}

.capsule::after{

    content:"";

    position:absolute;

    left:8%;

    top:10%;

    width:84%;

    height:35%;

    border-radius:999px;

    background:

        linear-gradient(

            rgba(255,255,255,.9),

            transparent

        );

}

.capsule:hover{

    transform:

        rotate(-10deg)

        scale(1.08);

}


/*======================================
    Tablet
======================================*/

.tablet{

    position:relative;

    width:42px;

    height:42px;

    border-radius:50%;

    background:

        radial-gradient(

            circle at 35% 30%,

            #ffffff,

            #fafafa 60%,

            #e6e6e6

        );

    border:none;

    box-shadow:

        inset 0 2px 6px rgba(255,255,255,.95),

        inset 0 -4px 7px rgba(0,0,0,.08),

        0 8px 18px rgba(255,150,200,.22);

}

.tablet::before{

    content:"";

    position:absolute;

    left:15%;

    right:15%;

    top:50%;

    height:2px;

    transform:translateY(-50%);

    background:

        rgba(190,170,200,.55);

}

.tablet::after{

    content:"";

    position:absolute;

    left:22%;

    top:18%;

    width:34%;

    height:16%;

    border-radius:999px;

    background:

        rgba(255,255,255,.9);

}

.tablet:hover{

    transform:

        rotate(12deg)

        scale(1.08);

}


/*======================================
    Button
======================================*/

.btn-action{

    position:relative;

    overflow:hidden;

    background:

        linear-gradient(

            180deg,

            #ff8fc6,

            #ff5fa5

        );

    border:none;

    box-shadow:

        0 8px 18px rgba(255,120,180,.28);

}

.btn-action::before{

    content:"";

    position:absolute;

    top:0;

    left:-140%;

    width:45%;

    height:100%;

    transform:skewX(-25deg);

    background:

        rgba(255,255,255,.55);

    transition:left .8s;

}

.btn-action:hover::before{

    left:170%;

}

.btn-action:hover{

    transform:

        translateY(-3px);

    box-shadow:

        0 14px 26px rgba(255,120,180,.38);

}


/*======================================
    Floating
======================================*/

.capsule,
.tablet{

    transition:

        .35s ease;

}
/*======================================
    Floating Sparkles
======================================*/

.error-container .sparkle{

    position:absolute;

    width:8px;

    height:8px;

    border-radius:50%;

    background:#fff;

    box-shadow:
        0 0 10px #fff,
        0 0 20px rgba(255,170,220,.8);

    animation:sparkle 3s linear infinite;

}

.error-container .sparkle:nth-child(1){

    left:12%;
    top:18%;
    animation-delay:0s;

}

.error-container .sparkle:nth-child(2){

    right:18%;
    top:28%;
    animation-delay:1s;

}

.error-container .sparkle:nth-child(3){

    left:25%;
    bottom:20%;
    animation-delay:2s;

}

.error-container .sparkle:nth-child(4){

    right:15%;
    bottom:28%;
    animation-delay:1.5s;

}

@keyframes sparkle{

    0%,100%{

        opacity:.2;
        transform:scale(.7);

    }

    50%{

        opacity:1;
        transform:scale(1.4);

    }

}


/*======================================
    Floating Hearts
======================================*/

body::after{

    content:"";

    position:absolute;

    inset:0;

    pointer-events:none;

    opacity:.18;

    background-image:

        radial-gradient(circle at 15% 25%, #ffffff 3px, transparent 4px),
        radial-gradient(circle at 70% 40%, #ffd4ea 4px, transparent 5px),
        radial-gradient(circle at 82% 78%, #ffffff 3px, transparent 4px),
        radial-gradient(circle at 30% 82%, #ffd8ef 5px, transparent 6px);

    animation:

        twinkle 8s linear infinite;

}

@keyframes twinkle{

    from{

        transform:translateY(0);

    }

    to{

        transform:translateY(-40px);

    }

}


/*======================================
    Message
======================================*/

.error-message{

    line-height:2;

    font-weight:700;

    color:#3a2933;

}

.error-message span{

    color:var(--pink-dark);

    text-shadow:

        0 0 8px rgba(255,170,220,.45);

}


/*======================================
    Link
======================================*/

.back-link{

    display:inline-block;

    margin-top:10px;

    color:#5b4952;

    transition:.3s;

}

.back-link:hover{

    color:var(--pink);

    letter-spacing:1px;

}


/*======================================
    Falling Medicine
======================================*/

.falling-med{

    overflow:hidden;

}

.falling-med::after{

    content:"";

    position:absolute;

    left:10%;

    top:8%;

    width:80%;

    height:30%;

    border-radius:999px;

    background:

        linear-gradient(

            rgba(255,255,255,.9),

            transparent

        );

}


/*======================================
    Mobile
======================================*/

@media (max-width:600px){

    .error-container{

        padding:38px 24px;

    }

    .error-code{

        font-size:4.3rem;

    }

    .medicine-display{

        gap:18px;

    }

    .capsule{

        width:62px;

        height:28px;

    }

    .tablet{

        width:34px;

        height:34px;

    }

    .btn-action{

        width:100%;

    }

}


/*======================================
    Reduced Motion
======================================*/

@media (prefers-reduced-motion:reduce){

    *{

        animation:none!important;

        transition:none!important;

    }

}


/*======================================
    Selection
======================================*/

::selection{

    background:var(--pink);

    color:#fff;

}

    </style>
</head>
<body>

    <div class="error-container" id="mainCard">
        <div class="medicine-display">
            <div class="capsule"></div>
            <div class="tablet"></div>
        </div>
        
        <h1 class="error-code">404</h1>
        <div class="error-status">Not Found</div>
        
        <p class="error-message">
            あ、れ……？どこをさがしても、<br>
            キミのページがみつからないの。<br>
            <span style="color: var(--pami-pink);">ねえ、わたしから逃げちゃったの……？</span><br>
            おねがいだから、ひとりにしないで。
        </p>
        
        <button class="btn-action" onclick="takeMedicine()">お薬をのむ</button>
        <a href="/" class="back-link">現実（ホーム）へ戻る</a>
    </div>

    <script>
        function takeMedicine() {
            const card = document.getElementById('mainCard');
            
            // 画面（カード）を揺らす演出
            card.classList.remove('shake-effect');
            void card.offsetWidth; // リフローを起こしてアニメーションをリセット
            card.classList.add('shake-effect');

            // 大量のお薬を降らせる
            const colors = ['#ff6699', '#cda4de', '#ffb7d5', '#ffffff'];
            for (let i = 0; i < 24; i++) {
                setTimeout(() => {
                    createMedicineRain(colors);
                }, i * 60); // 連続して小出しに降らせる
            }
        }

        function createMedicineRain(colors) {
            const med = document.createElement('div');
            med.classList.add('falling-med');
            
            // カプセルか錠剤かをランダム決定
            const isCapsule = Math.random() > 0.5;
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            if (isCapsule) {
                // カプセル生成
                med.style.width = '44px';
                med.style.height = '20px';
                med.style.borderRadius = '10px';
                med.style.background = `linear-gradient(to right, ${randomColor} 50%, #ffffff 50%)`;
            } else {
                // 錠剤生成
                med.style.width = '26px';
                med.style.height = '26px';
                med.style.borderRadius = '50%';
                med.style.background = '#ffffff';
                med.style.border = `2px solid ${randomColor}`;
            }

            // 出現位置・速度のランダム化
            med.style.left = Math.random() * 100 + 'vw';
            med.style.top = '-40px';
            
            const duration = Math.random() * 1.5 + 1.5; // 1.5秒〜3.0秒で落下
            med.style.animationDuration = duration + 's';

            document.body.appendChild(med);

            // 画面外に消えたら要素を削除
            setTimeout(() => {
                med.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
