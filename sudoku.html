<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sudoku.css">
<title>数独</title>
</head>
<body>
<div class="heart-bg"></div>
<div id="loading" class="loading">問題を生成中...</div>

<header>
<h1>♥♡ KAWAII SUDOKU ♡♥</h1>
</header>

<div class="controls">
<select id="difficulty">
<option value="easy">初級</option>
<option value="medium" selected>中級</option>
<option value="hard">上級</option>
</select>
<button id="btn-new">新しい問題</button>
</div>

<div class="board-container" id="board"></div>
<br>
<div class="game-actions">
<button id="btn-undo">戻る</button>
<button id="btn-redo">進む</button>
<button id="btn-hint">ヒント</button>
<button id="btn-check">チェック</button>
<button id="btn-reset">リセット</button>
</div>

<div class="keypad">
<button class="num-btn">1</button>
<button class="num-btn">2</button>
<button class="num-btn">3</button>
<button class="num-btn">4</button>
<button class="num-btn">5</button>
<button class="num-btn">6</button>
<button class="num-btn">7</button>
<button class="num-btn">8</button>
<button class="num-btn">9</button>
<button class="action-btn" id="key-note">メモ</button>
<button class="action-btn" id="key-delete" style="grid-column: span 5; background: #fee2e2; color: #ef4444;">消去</button>
</div>

<script src="sudoku.js"></script>

</body>
</html>
